# 复制到服务器: /etc/nginx/conf.d/channel.ghammerwinery.com.conf
# certbot 首次申请证书前，可先注释 ssl 相关行，仅用 80 端口跑 certbot

# HTTP：申请证书 + 强制 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name channel.ghammerwinery.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name channel.ghammerwinery.com;

    # certbot --nginx 会自动写入；手动部署时替换为实际证书路径
    ssl_certificate     /etc/letsencrypt/live/channel.ghammerwinery.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/channel.ghammerwinery.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10M;

    # 上传图片静态目录（与 Next.js public/uploads 一致）
    location /uploads/ {
        alias /var/www/ghammerwinery/public/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
